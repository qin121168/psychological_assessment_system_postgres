<!DOCTYPE html>
<!-- v3.1 - 创伤测评模块（修复版） -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>应急中心 · 心理测评系统</title>
<style>
:root {
  --primary: #1a3c5e;
  --primary-light: #2a5a8e;
  --accent: #c0392b;
  --bg: #f5f7fa;
  --card: #ffffff;
  --border: #dce3e8;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --success: #27ae60;
  --warning: #f39c12;
  --danger: #e74c3c;
  --dim-blue: #e8f0fe;
  --dim-red: #fdecea;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--primary) 0%, #0d2137 100%);
  color: white;
  padding: 16px 0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left { text-align: left; }
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: 2px; }
.header .subtitle { font-size: 12px; opacity: 0.8; margin-top: 2px; }
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.user-info {
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.user-info .avatar {
  width: 30px;
  height: 30px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
}
.header-btn {
  padding: 5px 14px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
  color: white;
  border-radius: 5px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  display: inline-block;
}
.header-btn:hover {
  background: rgba(255,255,255,0.2);
  border-color: rgba(255,255,255,0.5);
}
.header-btn.danger:hover {
  background: var(--accent);
  border-color: var(--accent);
}

/* Info Bar */
.info-bar {
  background: white;
  padding: 12px 32px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}
.info-bar label { font-size: 13px; color: var(--text-light); font-weight: 500; white-space: nowrap; }
.info-bar input {
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 14px;
  width: 160px;
  outline: none;
  transition: border-color 0.2s;
}
.info-bar input:focus { border-color: var(--primary); }
.info-bar .required-mark { color: var(--danger); margin-left: 2px; }

/* Mode Selector */
.mode-selector {
  background: white;
  padding: 8px 32px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  gap: 12px;
}
.mode-selector .mode-label { font-size: 13px; color: var(--text-light); font-weight: 500; }
.mode-btn {
  padding: 6px 20px;
  border: 2px solid var(--border);
  background: white;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-light);
  transition: all 0.2s;
}
.mode-btn:hover { border-color: var(--primary-light); color: var(--primary); background: var(--dim-blue); }
.mode-btn.active { background: var(--primary-light); color: white; border-color: var(--primary-light); }

/* Progress bar */
.progress-wrap {
  background: white;
  padding: 16px 32px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.progress-bar {
  flex: 1;
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
  min-width: 200px;
}
.progress-fill {
  height: 100%;
  background: var(--primary-light);
  border-radius: 4px;
  transition: width 0.4s ease;
}
.progress-text { font-size: 13px; color: var(--text-light); white-space: nowrap; }

/* Container */
.container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

/* Tab nav */
.tab-nav {
  display: flex;
  background: var(--card);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.tab-btn {
  flex: 1;
  min-width: 120px;
  padding: 14px 8px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-light);
  transition: all 0.2s;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--primary); background: var(--dim-blue); }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary-light); background: var(--dim-blue); }
.tab-btn.done { color: var(--success); }
.tab-btn .tab-badge {
  display: inline-block;
  width: 20px; height: 20px;
  line-height: 20px;
  border-radius: 50%;
  background: var(--border);
  color: var(--text-light);
  font-size: 11px;
  margin-right: 4px;
}
.tab-btn.done .tab-badge { background: var(--success); color: white; }
.tab-btn.active .tab-badge { background: var(--primary-light); color: white; }

/* Card */
.card {
  background: var(--card);
  border-radius: 10px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  padding: 28px 32px;
  margin-bottom: 20px;
}
.card h2 {
  font-size: 18px;
  color: var(--primary);
  margin-bottom: 8px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
}
.card .guide {
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 20px;
  padding: 10px 14px;
  background: #f8fafc;
  border-left: 3px solid var(--primary-light);
  border-radius: 0 6px 6px 0;
}

/* Scale items */
.scale-item {
  padding: 14px 0;
  border-bottom: 1px solid #f0f2f5;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: flex-start;
}
.scale-item:last-child { border-bottom: none; }
.scale-item .item-num {
  width: 32px;
  height: 32px;
  line-height: 32px;
  text-align: center;
  background: var(--primary-light);
  color: white;
  border-radius: 50%;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 2px;
}
.scale-item .item-num.rev { background: var(--accent); }
.scale-item .item-text {
  flex: 1;
  min-width: 240px;
  font-size: 14px;
  padding-top: 5px;
}
.scale-item .item-dim {
  font-size: 11px;
  color: var(--primary-light);
  background: var(--dim-blue);
  padding: 2px 8px;
  border-radius: 10px;
  white-space: nowrap;
  height: 22px;
  line-height: 18px;
  margin-top: 5px;
}
.scale-item .item-dim.rev-dim {
  color: var(--accent);
  background: var(--dim-red);
}

/* Radio options */
.radio-group {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
  margin-top: 3px;
}
.radio-opt {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 44px;
}
.radio-opt input[type="radio"] { display: none; }
.radio-opt label {
  display: block;
  width: 34px;
  height: 34px;
  line-height: 34px;
  text-align: center;
  border: 2px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-light);
  transition: all 0.15s;
  background: white;
}
.radio-opt input:checked + label {
  background: var(--primary-light);
  color: white;
  border-color: var(--primary-light);
}
.radio-opt:hover label {
  border-color: var(--primary-light);
  background: var(--dim-blue);
}
.radio-opt .opt-label {
  font-size: 10px;
  color: var(--text-light);
  margin-top: 2px;
  text-align: center;
  line-height: 1.2;
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 24px;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 28px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary { background: var(--primary-light); color: white; }
.btn-primary:hover { background: var(--primary); }
.btn-outline { background: white; color: var(--primary-light); border: 2px solid var(--primary-light); }
.btn-outline:hover { background: var(--dim-blue); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #219a52; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Result page */
.result-section {
  margin-bottom: 24px;
}
.result-section h3 {
  font-size: 16px;
  color: var(--primary);
  margin-bottom: 12px;
  padding: 10px 14px;
  background: var(--dim-blue);
  border-radius: 6px;
}
.result-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-bottom: 12px;
}
.result-table th {
  background: var(--primary);
  color: white;
  padding: 10px 12px;
  text-align: center;
  font-weight: 600;
}
.result-table td {
  padding: 8px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.result-table tr:nth-child(even) td { background: #f8fafc; }
.result-table .dim-name { text-align: left; font-weight: 600; color: var(--primary); }
.result-high { color: var(--danger); font-weight: 700; }
.result-mid { color: var(--warning); font-weight: 700; }
.result-low { color: var(--success); font-weight: 700; }

.result-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
.result-bar {
  flex: 1;
  height: 16px;
  background: #e9ecef;
  border-radius: 8px;
  overflow: hidden;
}
.result-bar-fill {
  height: 100%;
  border-radius: 8px;
  transition: width 0.6s ease;
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 24px;
  margin-bottom: 16px;
}
.info-item { display: flex; gap: 8px; font-size: 14px; }
.info-item .info-label { color: var(--text-light); }
.info-item .info-value { font-weight: 600; }

/* Result badge - 修复：新增缺失样式 */
.result-badge {
  padding: 12px 16px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  line-height: 1.6;
  margin-top: 10px;
}
.result-badge.result-high {
  background: var(--dim-red);
  color: #b71c1c;
  border-left: 4px solid var(--danger);
}
.result-badge.result-mid {
  background: #fff8e1;
  color: #e65100;
  border-left: 4px solid var(--warning);
}
.result-badge.result-low {
  background: #e8f5e9;
  color: #1b5e20;
  border-left: 4px solid var(--success);
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: white;
  padding: 10px 24px;
  border-radius: 6px;
  font-size: 14px;
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.3s;
}
.toast.show { opacity: 1; }

/* Print */
@media print {
  .header, .tab-nav, .btn-row, .progress-wrap, .mode-selector, .info-bar { display: none; }
  .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
  body { background: white; }
  .result-badge { border: 1px solid #ccc; }
}

/* Responsive */
@media (max-width: 640px) {
  .card { padding: 16px; }
  .radio-opt { min-width: 36px; }
  .radio-opt label { width: 28px; height: 28px; line-height: 28px; font-size: 11px; }
  .scale-item { flex-direction: column; gap: 4px; }
  .info-grid { grid-template-columns: 1fr; }
  .info-bar, .mode-selector, .progress-wrap { padding: 12px 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <h1>应急中心</h1>
      <div class="subtitle" id="headerSubtitle">新入职人员心理测评</div>
    </div>
    <div class="header-right">
      <div class="user-info">
        <div class="avatar">{{ username[0]|upper if username else 'U' }}</div>
        <span>{{ username }}</span>
      </div>
      {% if session.is_admin %}
      <a href="{{ url_for('admin') }}" class="header-btn">后台管理</a>
      {% endif %}
      <a href="{{ url_for('logout') }}" class="header-btn danger">退出登录</a>
    </div>
  </div>
</div>

<div class="info-bar">
  <label>姓名<span class="required-mark">*</span></label>
  <input type="text" id="infoName" placeholder="请输入姓名" oninput="savePersonInfo()">
  <label>岗位<span class="required-mark">*</span></label>
  <input type="text" id="infoJob" placeholder="请输入岗位" oninput="savePersonInfo()">
</div>

<div class="mode-selector">
  <span class="mode-label">测评类型：</span>
  <button class="mode-btn active" data-mode="new" onclick="switchMode('new')">新入职人员测评</button>
  <button class="mode-btn" data-mode="active" onclick="switchMode('active')">在岗人员筛查</button>
  <button class="mode-btn" data-mode="trauma" onclick="switchMode('trauma')">重大险情后创伤测评</button>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 / 104 题已完成</div>
</div>

<div class="container">

<!-- Tab Navigation -->
<div class="tab-nav" id="tabNav"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Scale panels are dynamically generated by JS -->

<!-- ==================== RESULT PANEL ==================== -->
<div class="card tab-panel" id="panelResult" style="display:none">
  <h2>测评结果汇总</h2>
  <div class="guide" id="resultGuide">以下为自动统计生成的测评结果，可打印存档。请核对各项得分。</div>
  <div id="resultContent"></div>
  <div class="btn-row">
    <button class="btn btn-outline" onclick="switchTab(scales.length-1)">← 返回修改</button>
    <button class="btn btn-primary" onclick="window.print()">打印结果</button>
    <button class="btn btn-success" onclick="saveResult()">保存结果</button>
    <button class="btn btn-primary" onclick="exportResult()">导出结果</button>
  </div>
  <div id="savedResults" style="margin-top:24px"></div>
</div>

</div>

<script>
// ==================== ERROR REPORTER ====================
window.onerror = function(msg, url, line, col, err) {
  var box = document.getElementById('errorBox');
  if (!box) {
    box = document.createElement('div');
    box.id = 'errorBox';
    box.style.cssText = 'position:fixed;bottom:12px;right:12px;max-width:420px;padding:12px 16px;background:#fff3f3;border:2px solid #c62828;border-radius:8px;font-size:12px;color:#333;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2)';
    document.body.appendChild(box);
  }
  box.innerHTML = '<b style="color:#c62828">JS Error (line ' + line + '):</b> ' + msg + '<br><small>Reload page after fix (Ctrl+F5)</small>';
};

// ==================== DATA: 新入职人员 ====================

// ==================== STATE ====================
let currentMode = 'new';
let scales = [];
let currentTab = 0;

// ==================== MODE SWITCHING ====================
function switchMode(mode) {
  if (currentMode === mode && scales.length > 0) return;
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  const subtitles = { new: '新入职人员心理测评', active: '在岗人员心理筛查', trauma: '重大险情后创伤测评' };
  document.getElementById('headerSubtitle').textContent = subtitles[mode] || '';
  const modeScales = { new: scalesNew, active: scalesInService, trauma: scalesPostTrauma };
  scales = [...(modeScales[mode] || scalesPostTrauma)];
  renderTabs();
  renderAll();
  currentTab = 0;
  switchTab(0);
  for (let i = 0; i < scales.length; i++) loadAnswers(i);
  updateProgress();
  for (let i = 0; i < scales.length; i++) updateTabStatus(i);
}

// ==================== DYNAMIC TABS & PANELS ====================
function renderTabs() {
  const tabNav = document.getElementById('tabNav');
  tabNav.innerHTML = '';
  for (let i = 0; i < scales.length; i++) {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.innerHTML = '<span class="tab-badge">' + (i+1) + '</span>' + (scales[i].tabName || scales[i].name);
    btn.onclick = function() { switchTab(i); };
    tabNav.appendChild(btn);
  }
  const resultBtn = document.createElement('button');
  resultBtn.className = 'tab-btn';
  resultBtn.id = 'tabResult';
  resultBtn.innerHTML = '<span class="tab-badge">★</span>' + {new:'测评结果',active:'筛查结果',trauma:'测评结果'}[currentMode];
  resultBtn.onclick = function() { switchTab(scales.length); };
  tabNav.appendChild(resultBtn);
}

function renderAll() {
  document.querySelectorAll('.scale-panel').forEach(function(el) { el.remove(); });
  var resultPanel = document.getElementById('panelResult');
  var container = resultPanel.parentNode;
  for (var i = scales.length - 1; i >= 0; i--) {
    (function(idx) {
      var sc = scales[idx];
      var panel = document.createElement('div');
      panel.className = 'card tab-panel scale-panel';
      panel.id = 'panel' + idx;
      panel.style.display = 'none';
      var prevBtn = idx > 0 ? '<button class="btn btn-outline" onclick="switchTab(' + (idx-1) + ')">← 上一量表</button>' : '';
      var isLast = idx === scales.length - 1;
      var nextBtn = isLast
        ? '<button class="btn btn-success" onclick="calcAll()">' + {new:'完成测评，查看结果',active:'完成筛查，查看结果',trauma:'完成测评，查看结果'}[currentMode] + '</button>'
        : '<button class="btn btn-primary" onclick="nextTab(' + idx + ')">下一量表 →</button>';
      panel.innerHTML = '<h2>量表' + (idx+1) + '：' + (sc.fullName || sc.name) + '</h2><div class="guide">' + sc.guide + '</div><form id="form' + idx + '"></form><div class="btn-row">' + prevBtn + '<button class="btn btn-outline" onclick="switchTab(' + idx + ',true)">清空重填</button>' + nextBtn + '</div>';
      container.insertBefore(panel, resultPanel);
    })(i);
  }
  for (var j = 0; j < scales.length; j++) renderScale(j);
}

function getTotalItems() {
  return scales.reduce(function(s, sc) { return s + sc.items.length; }, 0);
}

// ==================== RENDER SCALE ITEMS ====================
function renderScale(idx) {
  var sc = scales[idx];
  var form = document.getElementById('form' + idx);
  if (!form) return;
  form.innerHTML = '';
  sc.items.forEach(function(item) {
    var isRev = sc.reverseItems.includes(item.n);
    var div = document.createElement('div');
    div.className = 'scale-item';
    div.innerHTML = '<span class="item-num' + (isRev ? ' rev' : '') + '">' + item.n + '</span>' +
      '<span class="item-text">' + item.t + '</span>' +
      '<span class="item-dim' + (isRev ? ' rev-dim' : '') + '">' + item.d + (isRev ? ' ※R' : '') + '</span>' +
      '<span class="radio-group">' +
      sc.options.map(function(opt) {
        return '<span class="radio-opt"><input type="radio" name="q' + idx + '_' + item.n + '" id="q' + idx + '_' + item.n + '_' + opt.v + '" value="' + opt.v + '" onchange="onAnswer(' + idx + ')"><label for="q' + idx + '_' + item.n + '_' + opt.v + '">' + opt.v + '</label>' + (opt.l ? '<span class="opt-label">' + opt.l + '</span>' : '') + '</span>';
      }).join('') +
      '</span>';
    form.appendChild(div);
  });
}

// ==================== NAVIGATION ====================
function switchTab(idx, reset) {
  if (reset && idx < scales.length) {
    var form = document.getElementById('form' + idx);
    if (form) {
      form.querySelectorAll('input[type="radio"]').forEach(function(r) { r.checked = false; });
    }
    sessionStorage.removeItem(currentMode + '_scale_' + idx);
    updateProgress();
  }
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.style.display = 'none'; });
  if (idx < scales.length) {
    document.getElementById('panel' + idx).style.display = 'block';
  } else {
    document.getElementById('panelResult').style.display = 'block';
  }
  var btns = document.querySelectorAll('#tabNav .tab-btn');
  btns.forEach(function(b, i) { b.classList.remove('active'); if (i === idx) b.classList.add('active'); });
  currentTab = idx;
  var target = idx < scales.length ? document.getElementById('panel' + idx) : document.getElementById('panelResult');
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function nextTab(fromIdx) {
  var sc = scales[fromIdx];
  var answered = countAnswered(fromIdx);
  if (answered < sc.items.length) {
    showToast('还有 ' + (sc.items.length - answered) + ' 题未作答，建议完成后再切换');
  }
  var next = fromIdx + 1;
  if (next >= scales.length) next = scales.length;
  switchTab(next);
}

// ==================== ANSWER TRACKING ====================
function onAnswer(idx) { saveAnswers(idx); updateProgress(); updateTabStatus(idx); }

function countAnswered(idx) {
  var form = document.getElementById('form' + idx);
  if (!form) return 0;
  var sc = scales[idx];
  var count = 0;
  sc.items.forEach(function(item) {
    if (form.querySelector('input[name="q' + idx + '_' + item.n + '"]:checked')) count++;
  });
  return count;
}

function saveAnswers(idx) {
  var form = document.getElementById('form' + idx);
  if (!form) return;
  var sc = scales[idx];
  var answers = {};
  sc.items.forEach(function(item) {
    var checked = form.querySelector('input[name="q' + idx + '_' + item.n + '"]:checked');
    if (checked) answers[item.n] = parseInt(checked.value);
  });
  sessionStorage.setItem(currentMode + '_scale_' + idx, JSON.stringify(answers));
}

function loadAnswers(idx) {
  var saved = sessionStorage.getItem(currentMode + '_scale_' + idx);
  if (!saved) return;
  var answers = JSON.parse(saved);
  var form = document.getElementById('form' + idx);
  if (!form) return;
  Object.keys(answers).forEach(function(num) {
    var radio = form.querySelector('input[name="q' + idx + '_' + num + '"][value="' + answers[num] + '"]');
    if (radio) radio.checked = true;
  });
}

function updateProgress() {
  var totalAnswered = 0;
  var total = getTotalItems();
  for (var i = 0; i < scales.length; i++) totalAnswered += countAnswered(i);
  var pct = total > 0 ? Math.round((totalAnswered / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = totalAnswered + ' / ' + total + ' 题已完成';
}

function updateTabStatus(idx) {
  var btns = document.querySelectorAll('#tabNav .tab-btn');
  var answered = countAnswered(idx);
  var sc = scales[idx];
  if (btns[idx]) {
    btns[idx].classList.toggle('done', answered >= sc.items.length);
  }
}

// ==================== SCORING ====================
function getScore(idx, itemNum) {
  var form = document.getElementById('form' + idx);
  if (!form) return null;
  var checked = form.querySelector('input[name="q' + idx + '_' + itemNum + '"]:checked');
  return checked ? parseInt(checked.value) : null;
}

function calcScale(idx) {
  var sc = scales[idx];
  var dimScores = {};
  var scores = {};
  var dimKeys = Object.keys(sc.dims);
  for (var di = 0; di < dimKeys.length; di++) {
    var dim = dimKeys[di];
    var itemNums = sc.dims[dim];
    var total = 0, count = 0;
    var items = [];
    for (var ni = 0; ni < itemNums.length; ni++) {
      var n = itemNums[ni];
      var raw = getScore(idx, n);
      if (raw === null) raw = 0;
      var item = sc.items.find(function(it) { return it.n === n; });
      var score = raw;
      if (item && item.r) {
        var maxVal = sc.options[sc.options.length - 1].v;
        var minVal = sc.options[0].v;
        score = maxVal + minVal - raw;
      }
      scores[n] = score;
      total += score; count++;
      items.push({ n: n, raw: raw, score: score, rev: item ? item.r : false });
    }
    dimScores[dim] = { total: total, count: count, items: items };
  }
  var totalScore = 0;
  Object.values(dimScores).forEach(function(d) { totalScore += d.total; });
  return { dimScores: dimScores, totalScore: totalScore, scores: scores };
}

function calcAll() {
  saveAnswers(currentTab);
  var allDone = true;
  var missingInfo = [];
  for (var i = 0; i < scales.length; i++) {
    var answered = countAnswered(i);
    if (answered < scales[i].items.length) {
      allDone = false;
      missingInfo.push(scales[i].name + ': ' + answered + '/' + scales[i].items.length + '题');
    }
  }
  if (!allDone) {
    showToast('以下量表尚未完成：' + missingInfo.join('; '));
    for (var i = 0; i < scales.length; i++) {
      if (countAnswered(i) < scales[i].items.length) { switchTab(i); break; }
    }
    return;
  }
  var results = [];
  for (var i = 0; i < scales.length; i++) results.push(calcScale(i));
  window._resultName = document.getElementById('infoName').value.trim();
  window._resultJob = document.getElementById('infoJob').value.trim();
  renderResults(results);
  switchTab(scales.length);
}

}

  var html = '<div class="info-grid"><div class="info-item"><span class="info-label">测评单位：</span><span class="info-value">应急中心</span></div><div class="info-item"><span class="info-label">测评日期：</span><span class="info-value">' + dateStr + '</span></div><div class="info-item"><span class="info-label">姓名：</span><span class="info-value">' + (window._resultName || getPersonName() || '（未填写）') + '</span></div><div class="info-item"><span class="info-label">岗位：</span><span class="info-value">' + (window._resultJob || getPersonJob() || '（未填写）') + '</span></div></div>';

  var rst = results[0], scl = scales[0];
  var totalMax = scl.totalMax;

  html += '<div class="result-section"><h3>一、创伤后应激反应评估（满分' + totalMax + '分）</h3>';
  html += '<table class="result-table"><thead><tr><th>维度</th><th>得分</th><th>满分</th><th>得分柱状图</th><th>说明</th></tr></thead><tbody>';
  Object.keys(rst.dimScores).forEach(function(dim) {
    var data = rst.dimScores[dim];
    var mx = scl.maxPerDim[dim];
    var pct = Math.round((data.total/mx)*100);
    html += '<tr><td class="dim-name">' + dim + '</td><td><b>' + data.total + '</b></td><td>' + mx + '</td><td><div class="result-bar-wrap"><div class="result-bar"><div class="result-bar-fill" style="width:' + pct + '%;background:#c62828"></div></div><span style="font-size:11px">' + pct + '%</span></div></td><td style="text-align:left;font-size:12px">' + (scl.dimDescs[dim] || '') + '</td></tr>';
  });
  var trauTotal = rst.totalScore;
  var trauLevel = scl.traumaLevels[0];
  scl.traumaLevels.forEach(function(lv) { if (trauTotal>=lv.range[0]&&trauTotal<=lv.range[1]) trauLevel=lv; });
  html += '<tr style="background:#f8fafc;font-weight:700"><td>创伤总分</td><td class="' + trauLevel.cls + '"><b>' + trauTotal + '</b></td><td>' + totalMax + '</td><td><div class="result-bar-wrap"><div class="result-bar"><div class="result-bar-fill" style="width:' + Math.round(trauTotal/totalMax*100) + '%;background:#c62828"></div></div><span style="font-size:11px">' + Math.round(trauTotal/totalMax*100) + '%</span></div></td><td class="' + trauLevel.cls + '" style="text-align:left;font-weight:700">' + trauLevel.level + '：' + trauLevel.desc + '</td></tr>';
  html += '</tbody></table></div>';

  // PTSD 临床警示筛查
  html += '<div class="result-section"><h3>二、PTSD 临床警示筛查</h3>';
  var bFlag=0, cFlag=0, dFlag=0, eFlag=0;
  scl.items.forEach(function(it) {
    var score = rst.scores[it.n] || 0;
    if (score >= 2) {
      var dims = scl.dims;
      if (dims['闯入性再体验'].indexOf(it.n)>=0) bFlag++;
      if (dims['回避与麻木'].indexOf(it.n)>=0) cFlag++;
      if (dims['认知情绪负性改变'].indexOf(it.n)>=0) dFlag++;
      if (dims['高警觉反应'].indexOf(it.n)>=0) eFlag++;
    }
  });
  var ptsdCriteriaMet = (bFlag>=1 && cFlag>=1 && dFlag>=2 && eFlag>=2);
  html += '<table class="result-table"><thead><tr><th>DSM-5 诊断标准维度</th><th>要求（中重度症状项数）</th><th>实际达标项数</th><th>状态</th></tr></thead><tbody>';
  html += '<tr><td class="dim-name">B.闯入性再体验症状</td><td>≥1项</td><td>' + bFlag + '</td><td class="' + (bFlag>=1?'result-low':'result-high') + '">' + (bFlag>=1?'达标':'未达标') + '</td></tr>';
  html += '<tr><td class="dim-name">C.持续性回避症状</td><td>≥1项</td><td>' + cFlag + '</td><td class="' + (cFlag>=1?'result-low':'result-high') + '">' + (cFlag>=1?'达标':'未达标') + '</td></tr>';
  html += '<tr><td class="dim-name">D.认知与情绪的负性改变</td><td>≥2项</td><td>' + dFlag + '</td><td class="' + (dFlag>=2?'result-low':'result-high') + '">' + (dFlag>=2?'达标':'未达标') + '</td></tr>';
  html += '<tr><td class="dim-name">E.警觉与反应性显著改变</td><td>≥2项</td><td>' + eFlag + '</td><td class="' + (eFlag>=2?'result-low':'result-high') + '">' + (eFlag>=2?'达标':'未达标') + '</td></tr>';
  html += '</tbody></table>';
  var funcScore = (rst.scores[19]||0)+(rst.scores[20]||0);
  html += '<p style="margin-top:10px;font-size:13px">F.社会功能影响评分：<b>' + funcScore + '</b> / 8（≥2表示存在临床意义上的功能损害）</p>';
  if (ptsdCriteriaMet && funcScore>=2) {

  } else if (ptsdCriteriaMet || funcScore>=2) {

  } else {

  }
  html += '</div>';

  // 岗位适配建议
  html += '<div class="result-section"><h3>三、岗位适配与干预建议</h3>';
  var pct = Math.round(trauTotal/totalMax*100);

  } else if (pct >= 50) {
    advice = '创伤反应较为明显，存在发展风险。(1)建议安排专业心理咨询，重点关注核心症状维度；(2)调整工作内容，避免高危、高压力的抢险任务；(3)安排经验丰富的同伴一对一支持；(4)建立每周心理状态自评制度，动态监测变化；(5)一个月后复查评估。';
  } else if (pct >= 25) {

}

function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 2500);
}

function getPersonName() { return sessionStorage.getItem('person_name') || ''; }

function restorePersonInfo() {

function saveResult() {
  var name = window._resultName || getPersonName();

  if (!name || !job) { showToast('请先在顶部填写姓名和岗位后再保存'); return; }
  var resultHTML = document.getElementById('resultContent').innerHTML;
  var now = new Date();
  var record = {
    name: name, job: job,
    date: now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0'),
    html: resultHTML, timestamp: now.getTime(), mode: currentMode
  };
  var saved = JSON.parse(localStorage.getItem('saved_results') || '[]');
